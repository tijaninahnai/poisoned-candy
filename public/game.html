<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poisoned Candy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,19,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #1a1a24;
      z-index: 100;
    }

    .room-code { font-size: 0.72rem; color: #444; letter-spacing: 2px; }
    .room-code span { color: #ff6b81; font-weight: 700; font-size: 0.85rem; }
    .hud-status { font-size: 0.78rem; color: #555; }
    .hud-status.playing { color: #4ecca3; }

    #field {
      position: fixed;
      inset: 0;
      top: 44px;
    }

    .candy-item {
      position: absolute;
      width: 80px;
      height: 80px;
      transform-origin: center;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      user-select: none;
    }

    .candy-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      /* No background, no border radius — pure transparent PNG */
    }

    .candy-item:hover {
      filter: drop-shadow(0 0 10px rgba(255,107,129,0.7)) brightness(1.15);
      z-index: 10;
    }

    .candy-item.picked { pointer-events: none; }
    .candy-item.dimmed { opacity: 0.25; filter: none; }

    /* Waiting overlay */
    #waitingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(15,15,19,0.93);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 200;
    }

    #waitingOverlay h2 { color: #ff6b81; font-size: 1.3rem; }

    .code-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 1.5rem 2.5rem;
      text-align: center;
    }

    .code-card p { color: #555; font-size: 0.72rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .code-card .code { font-size: 2.4rem; font-weight: 900; color: #ff6b81; letter-spacing: 8px; }

    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .wait-small { color: #444; font-size: 0.8rem; }

    .btn-leave {
      background: none;
      border: 1px solid #2a2a3a;
      color: #555;
      padding: 0.5rem 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-leave:hover { border-color: #ff6b81; color: #ff6b81; }
  </style>
</head>
<body>

<div id="hud">
  <div class="room-code">ROOM <span id="hudCode">—</span></div>
  <div class="hud-status" id="hudStatus">Waiting...</div>
</div>

<div id="field"></div>

<div id="waitingOverlay">
  <h2>🍬 Share this code</h2>
  <div class="code-card">
    <p>ROOM CODE</p>
    <div class="code" id="overlayCode">—</div>
  </div>
  <small class="wait-small pulse">Waiting for opponent to join...</small>
  <button class="btn-leave" onclick="leaveGame()">Leave</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const roomCode = window.location.pathname.split('/').pop().toUpperCase();
  const playerName = localStorage.getItem('playerName') || 'Player';
  const playerIndex = parseInt(localStorage.getItem('playerIndex') || '0');

  document.getElementById('hudCode').textContent = roomCode;
  document.getElementById('overlayCode').textContent = roomCode;

  async function loadGame() {
    try {
      const res = await fetch(`/api/game/${roomCode}`);
      if (!res.ok) {
        document.getElementById('waitingOverlay').innerHTML =
          '<h2 style="color:#ff6b81">Room not found</h2><button class="btn-leave" onclick="location.href=\'/\'">Go home</button>';
        return;
      }

      const data = await res.json();
      renderField(data);

      if (data.status === 'in_progress') {
        hideWaiting();
      }

      // Join socket room
      socket.emit('joinRoom', { roomCode, playerName });

    } catch (err) {
      console.error(err);
    }
  }

  function renderField(data) {
    const field = document.getElementById('field');
    field.innerHTML = '';

    data.field.forEach((pos, index) => {
      const el = document.createElement('div');
      el.className = 'candy-item';
      el.dataset.index = index;
      el.style.left = `calc(${pos.x}% - 40px)`;
      el.style.top = `calc(${pos.y}% - 40px)`;
      el.style.transform = `rotate(${pos.rotation}deg)`;

      const img = document.createElement('img');
      img.src = data.candy.imageUrl;
      img.alt = data.candy.name;

      el.appendChild(img);
      el.addEventListener('click', () => pickCandy(index, el, data.candy.colorPalette));
      field.appendChild(el);
    });
  }

  function hideWaiting() {
    document.getElementById('waitingOverlay').style.display = 'none';
    document.getElementById('hudStatus').textContent = 'Pick a candy!';
    document.getElementById('hudStatus').className = 'hud-status playing';
  }

  function pickCandy(index, el, colorPalette) {
    document.querySelectorAll('.candy-item').forEach(c => {
      c.classList.add('picked');
      if (c !== el) c.classList.add('dimmed');
    });

    el.style.filter = 'drop-shadow(0 0 20px rgba(255,107,129,1)) brightness(1.3)';

    // Emit pick to server — Step 7/8 will handle the response
    socket.emit('pickCandy', { roomCode, playerName, index });
  }

  function leaveGame() {
    window.location.href = '/';
  }

  // Socket events — expanded in Step 6
  socket.on('opponentJoined', () => {
    hideWaiting();
  });

  loadGame();
</script>
</body>
</html>
