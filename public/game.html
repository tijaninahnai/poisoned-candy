<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poisoned Candy — Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,19,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #2a2a3a;
      z-index: 100;
    }

    #hud .room-code {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 2px;
    }

    #hud .room-code span {
      color: #ff6b81;
      font-weight: 700;
      font-size: 0.9rem;
    }

    #hud .status {
      font-size: 0.8rem;
      color: #666;
    }

    #hud .status.waiting { color: #f0c040; }
    #hud .status.playing { color: #4ecca3; }

    #field {
      position: fixed;
      inset: 0;
      top: 48px;
    }

    .candy-item {
      position: absolute;
      width: 64px;
      height: 64px;
      transform-origin: center;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      user-select: none;
    }

    .candy-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      border-radius: 6px;
    }

    .candy-item:hover {
      transform: scale(1.15) rotate(var(--rot));
      filter: brightness(1.2) drop-shadow(0 0 8px rgba(255,107,129,0.6));
      z-index: 10;
    }

    .candy-item.picked {
      pointer-events: none;
    }

    /* Waiting overlay */
    #waitingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(15,15,19,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #waitingOverlay h2 {
      color: #ff6b81;
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }

    #waitingOverlay .code-display {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 1.5rem 2.5rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    #waitingOverlay .code-display p {
      color: #666;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    #waitingOverlay .code-display span {
      font-size: 2.5rem;
      font-weight: 900;
      color: #ff6b81;
      letter-spacing: 8px;
    }

    #waitingOverlay small {
      color: #444;
      font-size: 0.8rem;
    }

    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div id="hud">
    <div class="room-code">ROOM <span id="hudRoomCode">—</span></div>
    <div class="status waiting" id="hudStatus">Waiting for opponent...</div>
  </div>

  <div id="field"></div>

  <div id="waitingOverlay">
    <h2>🍬 Share this code</h2>
    <div class="code-display">
      <p>ROOM CODE</p>
      <span id="overlayRoomCode">—</span>
    </div>
    <small class="pulse">Waiting for your opponent to join...</small>
  </div>

  <script>
    const roomCode = window.location.pathname.split('/').pop();
    const playerName = sessionStorage.getItem('playerName') || 'Player';
    const playerIndex = parseInt(sessionStorage.getItem('playerIndex') || '0');

    let gameData = null;

    // Set room code in UI
    document.getElementById('hudRoomCode').textContent = roomCode;
    document.getElementById('overlayRoomCode').textContent = roomCode;

    // Load game data
    async function loadGame() {
      try {
        const res = await fetch(`/api/game/${roomCode}`);
        if (!res.ok) {
          document.getElementById('waitingOverlay').innerHTML = '<h2 style="color:#ff6b81">Room not found</h2>';
          return;
        }

        gameData = await res.json();
        renderField(gameData);

        // If player 2 — no waiting overlay needed, game starts
        if (playerIndex === 1) {
          document.getElementById('waitingOverlay').style.display = 'none';
          document.getElementById('hudStatus').textContent = 'Pick a candy!';
          document.getElementById('hudStatus').className = 'status playing';
        }

      } catch (err) {
        console.error('Failed to load game:', err);
      }
    }

    function renderField(data) {
      const field = document.getElementById('field');
      field.innerHTML = '';

      data.field.forEach((pos, index) => {
        const el = document.createElement('div');
        el.className = 'candy-item';
        el.dataset.index = index;
        el.style.left = `${pos.x}%`;
        el.style.top = `${pos.y}%`;
        el.style.setProperty('--rot', `${pos.rotation}deg`);
        el.style.transform = `rotate(${pos.rotation}deg)`;

        const img = document.createElement('img');
        img.src = data.candy.imageUrl;
        img.alt = data.candy.name;

        el.appendChild(img);
        el.addEventListener('click', () => pickCandy(index, el, data.candy.colorPalette));
        field.appendChild(el);
      });
    }

    function pickCandy(index, el, colorPalette) {
      // Disable all picks after one selection
      document.querySelectorAll('.candy-item').forEach(c => {
        c.classList.add('picked');
        c.style.cursor = 'default';
      });

      // Visual feedback on picked candy
      el.style.transform = `rotate(${el.style.getPropertyValue('--rot')}) scale(1.3)`;
      el.style.filter = 'brightness(1.4) drop-shadow(0 0 16px rgba(255,107,129,0.9))';

      // TODO: emit pick via Socket.IO in Step 6
      console.log(`Picked candy index: ${index}`);
    }

    loadGame();
  </script>
</body>
</html>
