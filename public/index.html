<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poisoned Candy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo h1 {
      font-size: 2rem;
      color: #ff6b81;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo p {
      color: #555;
      font-size: 0.85rem;
      margin-top: 0.4rem;
      letter-spacing: 1px;
    }

    .card {
      background: #1a1a24;
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid #2a2a3a;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: #0f0f13;
      border-radius: 10px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      background: none;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #ff6b81;
      color: white;
      font-weight: 600;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    input[type="text"] {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: #f0f0f0;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ff6b81; }

    .btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #ff6b81; color: white; }

    .error {
      background: #3a1a1a;
      color: #ff6b81;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }

    .error.show { display: block; }

    .candy-preview {
      text-align: center;
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #0f0f13;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
    }

    .candy-preview img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 8px;
    }

    .candy-preview p {
      color: #666;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    .candy-preview strong {
      display: block;
      color: #f0f0f0;
      font-size: 0.95rem;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🍬 Poisoned Candy</h1>
      <p>One candy is poisoned. Choose wisely.</p>
    </div>

    <div id="candyPreview" class="candy-preview" style="display:none">
      <img id="todayImg" src="" alt="Today's candy">
      <p>Today's candy</p>
      <strong id="todayName"></strong>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('create')">Create Room</button>
        <button class="tab" onclick="switchTab('join')">Join Room</button>
      </div>

      <!-- Create tab -->
      <div class="tab-content active" id="tab-create">
        <input type="text" id="createName" placeholder="Your name" maxlength="20">
        <button class="btn btn-primary" onclick="createRoom()">Create Game</button>
      </div>

      <!-- Join tab -->
      <div class="tab-content" id="tab-join">
        <input type="text" id="joinName" placeholder="Your name" maxlength="20">
        <input type="text" id="joinCode" placeholder="Room code (e.g. FOX42)" maxlength="5" style="text-transform:uppercase">
        <button class="btn btn-primary" onclick="joinRoom()">Join Game</button>
      </div>

      <div class="error" id="error"></div>
    </div>
  </div>

  <script>
    // Load today's candy preview
    async function loadTodayCandy() {
      try {
        const res = await fetch('/api/candy/today');
        if (res.ok) {
          const candy = await res.json();
          document.getElementById('todayImg').src = candy.imageUrl;
          document.getElementById('todayName').textContent = candy.name;
          document.getElementById('candyPreview').style.display = 'block';
        }
      } catch (err) {
        console.log('No active candy today');
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0) === (tab === 'create'));
      });
      document.getElementById('tab-create').classList.toggle('active', tab === 'create');
      document.getElementById('tab-join').classList.toggle('active', tab === 'join');
      hideError();
    }

    async function createRoom() {
      const name = document.getElementById('createName').value.trim();
      if (!name) return showError('Enter your name first.');

      try {
        const res = await fetch('/api/game/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerName: name })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('playerName', name);
          sessionStorage.setItem('playerIndex', '0');
          window.location.href = `/game/${data.roomCode}`;
        } else {
          showError(data.error);
        }
      } catch (err) {
        showError('Could not create room. Is the server running?');
      }
    }

    async function joinRoom() {
      const name = document.getElementById('joinName').value.trim();
      const code = document.getElementById('joinCode').value.trim().toUpperCase();
      if (!name) return showError('Enter your name first.');
      if (!code) return showError('Enter a room code.');

      try {
        const res = await fetch('/api/game/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerName: name, roomCode: code })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('playerName', name);
          sessionStorage.setItem('playerIndex', '1');
          window.location.href = `/game/${data.roomCode}`;
        } else {
          showError(data.error);
        }
      } catch (err) {
        showError('Could not join room.');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('error').classList.remove('show');
    }

    loadTodayCandy();
  </script>
</body>
</html>
