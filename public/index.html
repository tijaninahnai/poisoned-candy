<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poisoned Candy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 2rem;
      color: #ff6b81;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo p {
      color: #444;
      font-size: 0.82rem;
      margin-top: 0.4rem;
      letter-spacing: 1px;
    }

    .candy-preview {
      display: none;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .candy-preview img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .candy-preview p {
      color: #444;
      font-size: 0.75rem;
      margin-top: 0.3rem;
    }

    .candy-preview strong {
      display: block;
      color: #f0f0f0;
      font-size: 0.9rem;
    }

    /* Name section */
    .name-section {
      background: #1a1a24;
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      border: 1px solid #2a2a3a;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .name-section .avatar {
      width: 36px;
      height: 36px;
      background: #ff6b81;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .name-section .name-info { flex: 1; }
    .name-section .name-info small { color: #555; font-size: 0.72rem; display: block; }
    .name-section .name-info strong { font-size: 0.95rem; color: #f0f0f0; }

    .name-section button {
      background: none;
      border: 1px solid #2a2a3a;
      color: #666;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .name-section button:hover { border-color: #ff6b81; color: #ff6b81; }

    /* Name input (hidden by default) */
    .name-input-wrap {
      background: #1a1a24;
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      border: 1px solid #2a2a3a;
      margin-bottom: 1rem;
      display: none;
    }

    .name-input-wrap label {
      font-size: 0.75rem;
      color: #555;
      display: block;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .name-input-wrap input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      margin-bottom: 0.8rem;
    }

    .name-input-wrap input:focus { border-color: #ff6b81; }

    /* Action buttons */
    .actions { display: flex; flex-direction: column; gap: 0.8rem; }

    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #ff6b81; color: white; }
    .btn-secondary {
      background: #1a1a24;
      color: #f0f0f0;
      border: 1px solid #2a2a3a;
    }
    .btn-secondary:hover { border-color: #ff6b81; }
    .btn-sm {
      width: 100%;
      padding: 0.7rem;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      background: #ff6b81;
      color: white;
    }

    /* Matchmaking overlay */
    #matchmakingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,19,0.97);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      z-index: 500;
    }

    #matchmakingOverlay.show { display: flex; }

    .mm-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #2a2a3a;
      border-top-color: #ff6b81;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #matchmakingOverlay h2 { color: #f0f0f0; font-size: 1.2rem; }
    #matchmakingOverlay p { color: #555; font-size: 0.85rem; }

    .btn-cancel {
      background: none;
      border: 1px solid #2a2a3a;
      color: #666;
      padding: 0.6rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .btn-cancel:hover { border-color: #ff6b81; color: #ff6b81; }

    /* Invite overlay */
    #inviteOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,19,0.97);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.2rem;
      z-index: 500;
      padding: 2rem;
    }

    #inviteOverlay.show { display: flex; }
    #inviteOverlay h2 { color: #ff6b81; font-size: 1.3rem; }

    .invite-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      text-align: center;
      width: 100%;
      max-width: 320px;
    }

    .invite-card p { color: #555; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .invite-card .code { font-size: 2.2rem; font-weight: 900; color: #ff6b81; letter-spacing: 8px; }
    .invite-card .link { font-size: 0.75rem; color: #444; margin-top: 0.8rem; word-break: break-all; }

    .invite-actions { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 320px; }

    .error {
      color: #ff6b81;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2rem;
    }

    /* Join code input */
    .join-wrap {
      display: none;
      flex-direction: column;
      gap: 0.6rem;
    }

    .join-wrap.show { display: flex; }

    .join-wrap input {
      width: 100%;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: #f0f0f0;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
    }

    .join-wrap input:focus { border-color: #ff6b81; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>🍬 Poisoned Candy</h1>
    <p>One candy is poisoned. Choose wisely.</p>
  </div>

  <div class="candy-preview" id="candyPreview">
    <img id="todayImg" src="" alt="">
    <p>Today's candy</p>
    <strong id="todayName"></strong>
  </div>

  <!-- Name display -->
  <div class="name-section" id="nameSection">
    <div class="avatar" id="nameAvatar">?</div>
    <div class="name-info">
      <small>Playing as</small>
      <strong id="nameDisplay">—</strong>
    </div>
    <button onclick="editName()">Edit</button>
  </div>

  <!-- Name input (shown when no name set) -->
  <div class="name-input-wrap" id="nameInputWrap">
    <label>Your name</label>
    <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
    <button class="btn-sm" onclick="saveName()">Save name</button>
  </div>

  <!-- Actions -->
  <div class="actions" id="actions">
    <button class="btn btn-primary" onclick="playRandom()">⚡ Play with Stranger</button>
    <button class="btn btn-secondary" onclick="inviteFriend()">🔗 Invite a Friend</button>
    <button class="btn btn-secondary" onclick="toggleJoin()">🎯 Join with Code</button>
  </div>

  <!-- Join code input (toggled) -->
  <div class="join-wrap" id="joinWrap" style="margin-top:0.8rem">
    <input type="text" id="joinCode" placeholder="ENTER CODE" maxlength="5">
    <button class="btn-sm" onclick="joinWithCode()">Join Game</button>
  </div>

  <div class="error" id="error"></div>
</div>

<!-- Matchmaking overlay -->
<div id="matchmakingOverlay">
  <div class="mm-spinner"></div>
  <h2>Finding opponent...</h2>
  <p id="mmWaitTime">0s</p>
  <button class="btn-cancel" onclick="cancelMatchmaking()">Cancel</button>
</div>

<!-- Invite overlay -->
<div id="inviteOverlay">
  <h2>🍬 Invite a Friend</h2>
  <div class="invite-card">
    <p>ROOM CODE</p>
    <div class="code" id="inviteCode">—</div>
    <div class="link" id="inviteLink">—</div>
  </div>
  <div class="invite-actions">
    <button class="btn-sm" onclick="copyInviteLink()">📋 Copy invite link</button>
    <button class="btn-cancel" onclick="closeInvite()">Cancel</button>
  </div>
  <p id="inviteStatus" style="color:#555; font-size:0.82rem;">Waiting for opponent...</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let playerName = localStorage.getItem('playerName') || '';
  let mmTimer = null;
  let mmSeconds = 0;
  let currentRoomCode = null;
  let invitePollInterval = null;

  // Init
  initName();
  loadTodayCandy();

  function initName() {
    if (playerName) {
      showNameDisplay();
    } else {
      showNameInput();
    }
  }

  function showNameDisplay() {
    document.getElementById('nameSection').style.display = 'flex';
    document.getElementById('nameInputWrap').style.display = 'none';
    document.getElementById('nameDisplay').textContent = playerName;
    document.getElementById('nameAvatar').textContent = playerName.charAt(0).toUpperCase();
    document.getElementById('actions').style.opacity = '1';
    document.getElementById('actions').style.pointerEvents = 'auto';
  }

  function showNameInput() {
    document.getElementById('nameSection').style.display = 'none';
    document.getElementById('nameInputWrap').style.display = 'block';
    document.getElementById('actions').style.opacity = '0.3';
    document.getElementById('actions').style.pointerEvents = 'none';
  }

  function saveName() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) return showError('Enter a name first.');
    playerName = val;
    localStorage.setItem('playerName', playerName);
    showNameDisplay();
    hideError();
  }

  function editName() {
    document.getElementById('nameInput').value = playerName;
    showNameInput();
  }

  // Today's candy preview
  async function loadTodayCandy() {
    try {
      const res = await fetch('/api/candy/today');
      if (res.ok) {
        const candy = await res.json();
        document.getElementById('todayImg').src = candy.imageUrl;
        document.getElementById('todayName').textContent = candy.name;
        document.getElementById('candyPreview').style.display = 'block';
      }
    } catch (e) {}
  }

  // Play with stranger — matchmaking via Socket.IO
  function playRandom() {
    if (!playerName) return showError('Save your name first.');
    hideError();
    mmSeconds = 0;
    document.getElementById('mmWaitTime').textContent = '0s';
    document.getElementById('matchmakingOverlay').classList.add('show');

    mmTimer = setInterval(() => {
      mmSeconds++;
      document.getElementById('mmWaitTime').textContent = mmSeconds + 's';
    }, 1000);

    socket.emit('joinMatchmaking', { playerName });
  }

  function cancelMatchmaking() {
    clearInterval(mmTimer);
    socket.emit('leaveMatchmaking');
    document.getElementById('matchmakingOverlay').classList.remove('show');
  }

  // Matchmaking success — server found a match
  socket.on('matchFound', ({ roomCode }) => {
    clearInterval(mmTimer);
    document.getElementById('matchmakingOverlay').classList.remove('show');
    localStorage.setItem('playerName', playerName);
    window.location.href = `/game/${roomCode}`;
  });

  // Invite a friend
  async function inviteFriend() {
    if (!playerName) return showError('Save your name first.');
    hideError();

    try {
      const res = await fetch('/api/game/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerName })
      });
      const data = await res.json();
      if (!data.success) return showError(data.error);

      currentRoomCode = data.roomCode;
      const link = `${window.location.origin}/game/${data.roomCode}`;

      document.getElementById('inviteCode').textContent = data.roomCode;
      document.getElementById('inviteLink').textContent = link;
      document.getElementById('inviteOverlay').classList.add('show');

      // Poll until opponent joins
      invitePollInterval = setInterval(async () => {
        const r = await fetch(`/api/game/${data.roomCode}`);
        const g = await r.json();
        if (g.status === 'in_progress') {
          clearInterval(invitePollInterval);
          window.location.href = `/game/${data.roomCode}`;
        }
      }, 2000);

    } catch (err) {
      showError('Could not create room.');
    }
  }

  function closeInvite() {
    clearInterval(invitePollInterval);
    document.getElementById('inviteOverlay').classList.remove('show');
  }

  function copyInviteLink() {
    const link = document.getElementById('inviteLink').textContent;
    navigator.clipboard.writeText(link).then(() => {
      document.getElementById('inviteStatus').textContent = '✅ Link copied!';
      setTimeout(() => {
        document.getElementById('inviteStatus').textContent = 'Waiting for opponent...';
      }, 2000);
    });
  }

  // Join with code
  function toggleJoin() {
    const wrap = document.getElementById('joinWrap');
    wrap.classList.toggle('show');
    if (wrap.classList.contains('show')) {
      document.getElementById('joinCode').focus();
    }
  }

  async function joinWithCode() {
    if (!playerName) return showError('Save your name first.');
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    if (!code) return showError('Enter a room code.');

    try {
      const res = await fetch('/api/game/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerName, roomCode: code })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = `/game/${data.roomCode}`;
      } else {
        showError(data.error);
      }
    } catch (err) {
      showError('Could not join room.');
    }
  }

  function showError(msg) {
    document.getElementById('error').textContent = msg;
  }

  function hideError() {
    document.getElementById('error').textContent = '';
  }
</script>
</body>
</html>
