<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poisoned Candy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 1.4rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 2.6rem;
      color: #ff6b81;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .logo p {
      color: #444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      letter-spacing: 1px;
    }

    .candy-preview {
      display: none;
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .candy-preview img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .candy-preview p { color: #444; font-size: 0.75rem; margin-top: 0.4rem; }
    .candy-preview strong { display: block; color: #aaa; font-size: 0.9rem; margin-top: 0.1rem; }

    /* Name */
    .name-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #1a1a24;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      border: 1px solid #2a2a3a;
      margin-bottom: 1.2rem;
    }

    .avatar {
      width: 42px; height: 42px;
      background: #ff6b81;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
    }

    .name-info { flex: 1; }
    .name-info small { color: #555; font-size: 0.72rem; display: block; }
    .name-info strong { font-size: 1rem; }

    .edit-btn {
      background: none; border: 1px solid #2a2a3a;
      color: #555; border-radius: 8px;
      padding: 5px 12px; font-size: 0.78rem; cursor: pointer;
    }

    .edit-btn:hover { border-color: #ff6b81; color: #ff6b81; }

    .name-input-wrap {
      background: #1a1a24;
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      border: 1px solid #2a2a3a;
      margin-bottom: 1.2rem;
      display: none;
    }

    .name-input-wrap label {
      font-size: 0.72rem; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
      display: block; margin-bottom: 0.6rem;
    }

    .name-input-wrap input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      margin-bottom: 0.8rem;
    }

    .name-input-wrap input:focus { border-color: #ff6b81; }

    /* Buttons */
    .actions { display: flex; flex-direction: column; gap: 0.8rem; }

    .btn {
      width: 100%;
      padding: 1.15rem;
      border-radius: 16px;
      border: none;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      letter-spacing: 0.3px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #ff6b81; color: white; }
    .btn-secondary {
      background: #1a1a24;
      color: #f0f0f0;
      border: 1px solid #2a2a3a;
    }
    .btn-secondary:hover { border-color: #ff6b81; }

    .btn-sm {
      width: 100%; padding: 0.85rem;
      border-radius: 12px; border: none;
      background: #ff6b81; color: white;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }

    .disabled { opacity: 0.3; pointer-events: none; }
    .error { color: #ff6b81; font-size: 0.85rem; text-align: center; min-height: 1.2rem; margin-top: 0.6rem; }

    /* Overlays */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,15,19,0.97);
      z-index: 500;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      padding: 2rem 1.4rem;
    }

    .overlay.show { display: flex; }
    .overlay h2 { font-size: 1.3rem; color: #ff6b81; }

    /* Matchmaking */
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid #2a2a3a;
      border-top-color: #ff6b81;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .mm-time { color: #555; font-size: 0.9rem; }

    /* Lobby */
    .lobby-list {
      width: 100%; max-width: 420px;
      max-height: 55vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .lobby-player {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 1rem 1.1rem;
    }

    .online-dot {
      width: 9px; height: 9px;
      border-radius: 50%; flex-shrink: 0;
    }

    .online-dot.available { background: #4ecca3; box-shadow: 0 0 6px #4ecca3; }
    .online-dot.ingame { background: #f0c040; }

    .p-name { font-size: 0.95rem; }
    .p-status { font-size: 0.72rem; color: #555; margin-top: 2px; }

    .invite-btn {
      background: #ff6b81; border: none;
      border-radius: 10px; color: white;
      padding: 6px 14px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; flex-shrink: 0;
    }

    .invite-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .lobby-empty { color: #444; font-size: 0.85rem; text-align: center; padding: 2rem; }

    /* Invite popup */
    .invite-popup {
      display: none;
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      background: #1a1a24;
      border: 1px solid #ff6b81;
      border-radius: 18px;
      padding: 1.4rem 1.6rem;
      z-index: 600;
      width: 90%; max-width: 360px;
      box-shadow: 0 0 30px rgba(255,107,129,0.2);
    }

    .invite-popup.show { display: block; }
    .invite-popup p { font-size: 0.95rem; margin-bottom: 1rem; }
    .invite-popup p span { color: #ff6b81; font-weight: 700; }
    .invite-popup-btns { display: flex; gap: 0.7rem; }
    .invite-popup-btns button {
      flex: 1; padding: 0.75rem;
      border-radius: 12px; border: none;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }

    .btn-accept { background: #4ecca3; color: #0f0f13; }
    .btn-decline { background: #2a2a3a; color: #aaa; }

    /* Session overlay */
    .session-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 18px;
      padding: 1.8rem 2rem;
      text-align: center;
      width: 100%; max-width: 360px;
    }

    .session-card p { color: #555; font-size: 0.72rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .session-card .code { font-size: 2.2rem; font-weight: 900; color: #ff6b81; letter-spacing: 8px; }
    .session-card .link { font-size: 0.72rem; color: #444; margin-top: 0.7rem; word-break: break-all; }

    .session-actions {
      display: flex; flex-direction: column;
      gap: 0.7rem; width: 100%; max-width: 360px;
    }

    .btn-cancel {
      background: none; border: 1px solid #2a2a3a;
      color: #555; padding: 0.7rem 1.5rem;
      border-radius: 12px; cursor: pointer; font-size: 0.85rem;
      width: 100%;
    }

    .btn-cancel:hover { border-color: #ff6b81; color: #ff6b81; }
    .copied-msg { color: #4ecca3; font-size: 0.82rem; min-height: 1rem; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <h1>🍬 Poisoned<br>Candy</h1>
    <p>One candy is poisoned. Choose wisely.</p>
  </div>

  <div class="candy-preview" id="candyPreview">
    <img id="todayImg" src="" alt="">
    <p>Today's candy</p>
    <strong id="todayName"></strong>
  </div>

  <div class="name-bar" id="nameBar">
    <div class="avatar" id="avatar">?</div>
    <div class="name-info">
      <small>Playing as</small>
      <strong id="nameDisplay">—</strong>
    </div>
    <button class="edit-btn" onclick="editName()">Edit</button>
  </div>

  <div class="name-input-wrap" id="nameInputWrap">
    <label>Choose your name</label>
    <input type="text" id="nameInput" placeholder="Your name" maxlength="20"
      onkeydown="if(event.key==='Enter') saveName()">
    <button class="btn-sm" onclick="saveName()">Save</button>
  </div>

  <div class="actions" id="actions">
    <button class="btn btn-primary" onclick="playGame()">⚡ Play Game</button>
    <button class="btn btn-secondary" onclick="openLobby()">🏠 Lobby</button>
    <button class="btn btn-secondary" onclick="createSession()">🔗 Create Session</button>
  </div>

  <div class="error" id="error"></div>
</div>

<!-- Matchmaking overlay -->
<div class="overlay" id="mmOverlay">
  <div class="spinner"></div>
  <h2>Finding opponent...</h2>
  <p class="mm-time" id="mmTime">0s</p>
  <button class="btn-cancel" onclick="cancelMM()">Cancel</button>
</div>

<!-- Lobby overlay -->
<div class="overlay" id="lobbyOverlay">
  <h2>🏠 Lobby</h2>
  <div class="lobby-list" id="lobbyList">
    <p class="lobby-empty">No one else online right now...</p>
  </div>
  <button class="btn-cancel" onclick="closeLobby()">Leave Lobby</button>
</div>

<!-- Create session overlay -->
<div class="overlay" id="sessionOverlay">
  <h2>🔗 Create Session</h2>
  <div class="session-card">
    <p>ROOM CODE</p>
    <div class="code" id="sessionCode">—</div>
    <div class="link" id="sessionLink">—</div>
  </div>
  <div class="session-actions">
    <button class="btn-sm" onclick="copySessionLink()">📋 Copy invite link</button>
    <div class="copied-msg" id="copiedMsg"></div>
    <button class="btn-cancel" onclick="closeSession()">Cancel</button>
  </div>
  <p style="color:#555; font-size:0.82rem;">Waiting for opponent...</p>
</div>

<!-- Invite received popup -->
<div class="invite-popup" id="invitePopup">
  <p><span id="inviteFromName">Someone</span> wants to play!</p>
  <div class="invite-popup-btns">
    <button class="btn-accept" onclick="acceptInvite()">Accept</button>
    <button class="btn-decline" onclick="declineInvite()">Decline</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let playerName = localStorage.getItem('playerName') || '';
  let mmTimer = null, mmSecs = 0;
  let sessionPollInterval = null;
  let pendingInviteFrom = null;
  let inLobby = false;

  initName();
  loadTodayCandy();
  if (playerName) socket.emit('goOnline', { playerName });

  function initName() {
    if (playerName) showNameBar();
    else showNameInput();
  }

  function showNameBar() {
    document.getElementById('nameBar').style.display = 'flex';
    document.getElementById('nameInputWrap').style.display = 'none';
    document.getElementById('nameDisplay').textContent = playerName;
    document.getElementById('avatar').textContent = playerName.charAt(0).toUpperCase();
    document.getElementById('actions').classList.remove('disabled');
  }

  function showNameInput() {
    document.getElementById('nameBar').style.display = 'none';
    document.getElementById('nameInputWrap').style.display = 'block';
    document.getElementById('actions').classList.add('disabled');
  }

  function saveName() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) return showError('Enter a name first.');
    playerName = val;
    localStorage.setItem('playerName', playerName);
    showNameBar();
    hideError();
    socket.emit('goOnline', { playerName });
  }

  function editName() {
    document.getElementById('nameInput').value = playerName;
    showNameInput();
  }

  async function loadTodayCandy() {
    try {
      const res = await fetch('/api/candy/today');
      if (res.ok) {
        const candy = await res.json();
        document.getElementById('todayImg').src = candy.imageUrl;
        document.getElementById('todayName').textContent = candy.name;
        document.getElementById('candyPreview').style.display = 'block';
      }
    } catch (e) {}
  }

  function playGame() {
    if (!playerName) return showError('Save your name first.');
    hideError();
    mmSecs = 0;
    document.getElementById('mmTime').textContent = '0s';
    document.getElementById('mmOverlay').classList.add('show');
    mmTimer = setInterval(() => {
      mmSecs++;
      document.getElementById('mmTime').textContent = mmSecs + 's';
    }, 1000);
    socket.emit('joinMatchmaking', { playerName });
  }

  function cancelMM() {
    clearInterval(mmTimer);
    socket.emit('leaveMatchmaking');
    document.getElementById('mmOverlay').classList.remove('show');
  }

  function openLobby() {
    if (!playerName) return showError('Save your name first.');
    hideError();
    inLobby = true;
    document.getElementById('lobbyOverlay').classList.add('show');
    socket.emit('goOnline', { playerName });
  }

  function closeLobby() {
    inLobby = false;
    document.getElementById('lobbyOverlay').classList.remove('show');
  }

  socket.on('lobbyUpdate', (players) => {
    if (!inLobby) return;
    const list = document.getElementById('lobbyList');
    const others = players.filter(p => p.socketId !== socket.id);

    if (!others.length) {
      list.innerHTML = '<p class="lobby-empty">No one else online right now...</p>';
      return;
    }

    list.innerHTML = others.map(p => `
      <div class="lobby-player">
        <div class="online-dot ${p.status === 'ingame' ? 'ingame' : 'available'}"></div>
        <div style="flex:1">
          <div class="p-name">${p.name}</div>
          <div class="p-status">${p.status === 'ingame' ? 'In a game' : 'Available'}</div>
        </div>
        <button class="invite-btn"
          onclick="sendInvite('${p.socketId}', '${p.name.replace(/'/g, "\\'")}')"
          ${p.status === 'ingame' ? 'disabled' : ''}>
          Invite
        </button>
      </div>
    `).join('');
  });

  function sendInvite(toSocketId, toName) {
    socket.emit('sendInvite', { toSocketId, fromName: playerName });
    showError(`Invite sent to ${toName}...`);
  }

  socket.on('inviteReceived', ({ fromSocketId, fromName }) => {
    pendingInviteFrom = { socketId: fromSocketId, name: fromName };
    document.getElementById('inviteFromName').textContent = fromName;
    document.getElementById('invitePopup').classList.add('show');
  });

  socket.on('inviteCancelled', () => {
    pendingInviteFrom = null;
    document.getElementById('invitePopup').classList.remove('show');
  });

  socket.on('inviteDeclined', ({ byName }) => {
    showError(`${byName} declined your invite.`);
  });

  function acceptInvite() {
    if (!pendingInviteFrom) return;
    document.getElementById('invitePopup').classList.remove('show');
    socket.emit('acceptInvite', { fromSocketId: pendingInviteFrom.socketId, playerName });
    pendingInviteFrom = null;
  }

  function declineInvite() {
    if (!pendingInviteFrom) return;
    socket.emit('declineInvite', { fromSocketId: pendingInviteFrom.socketId, playerName });
    document.getElementById('invitePopup').classList.remove('show');
    pendingInviteFrom = null;
  }

  async function createSession() {
    if (!playerName) return showError('Save your name first.');
    hideError();
    try {
      const res = await fetch('/api/game/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerName })
      });
      const data = await res.json();
      if (!data.success) return showError(data.error);

      const link = `${window.location.origin}/game/${data.roomCode}`;
      document.getElementById('sessionCode').textContent = data.roomCode;
      document.getElementById('sessionLink').textContent = link;
      document.getElementById('sessionOverlay').classList.add('show');

      sessionPollInterval = setInterval(async () => {
        const r = await fetch(`/api/game/${data.roomCode}`);
        const g = await r.json();
        if (g.status === 'in_progress') {
          clearInterval(sessionPollInterval);
          window.location.href = `/game/${data.roomCode}`;
        }
      }, 2000);
    } catch (err) {
      showError('Could not create session.');
    }
  }

  function copySessionLink() {
    const link = document.getElementById('sessionLink').textContent;
    navigator.clipboard.writeText(link).then(() => {
      document.getElementById('copiedMsg').textContent = '✅ Copied!';
      setTimeout(() => document.getElementById('copiedMsg').textContent = '', 2000);
    });
  }

  function closeSession() {
    clearInterval(sessionPollInterval);
    document.getElementById('sessionOverlay').classList.remove('show');
  }

  socket.on('matchFound', ({ roomCode }) => {
    clearInterval(mmTimer);
    document.getElementById('mmOverlay').classList.remove('show');
    document.getElementById('lobbyOverlay').classList.remove('show');
    window.location.href = `/game/${roomCode}`;
  });

  socket.on('matchError', ({ error }) => {
    clearInterval(mmTimer);
    document.getElementById('mmOverlay').classList.remove('show');
    showError(error);
  });

  socket.on('inviteError', ({ error }) => {
    document.getElementById('invitePopup').classList.remove('show');
    showError(error);
  });

  function showError(msg) { document.getElementById('error').textContent = msg; }
  function hideError() { document.getElementById('error').textContent = ''; }
</script>
</body>
</html>
